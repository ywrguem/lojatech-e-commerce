<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LojaTech - Carrinho</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="header">
    <div class="container header-content">
      <h1 class="logo">Loja<span>Tech</span></h1>

      <nav aria-label="Menu principal">
        <ul class="menu">
          <li><a href="index.html">Início</a></li>
          <li><a href="produtos.html">Produtos</a></li>
          <li><a class="active" href="carrinho.html">Carrinho <span id="cart-count" class="cart-count">0</span></a></li>
          <li><a href="login.html">Login</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>

    <section class="cart-section" aria-label="Carrinho de compras">
      <div class="container">
        <h2 class="section-title">Seu Carrinho</h2>

        <div id="cart-items" class="cart-items"></div>

        <div class="cart-summary">
          <p>Total: <span id="cart-total">R$ 0,00</span></p>

          <button id="btn-clear" class="btn-primary" type="button">
            Limpar Carrinho
          </button>
        </div>

      </div>
    </section>

  </main>

  <footer class="footer">
    <div class="container footer-content">
      <p>© 2026 LojaTech - Todos os direitos reservados.</p>
      <p>Email: contato@lojatech.com | Telefone: (65) 98103-8426</p>
    </div>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
