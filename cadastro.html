<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LojaTech - Cadastro</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="header">
    <div class="container header-content">

      <h1 class="logo">Loja<span>Tech</span></h1>

      <nav aria-label="Menu principal">
        <ul class="menu">
          <li><a href="index.html">Início</a></li>
          <li><a href="produtos.html">Produtos</a></li>
          <li><a href="contato.html">Contato</a></li>
          <li><a class="active" href="cadastro.html" id="userLink">Cadastro</a></li>
          <li>
            <a href="carrinho.html">
              Carrinho <span id="cartCount" class="cart-count">0</span>
            </a>
          </li>
        </ul>
      </nav>

      <button id="themeBtn" class="theme-btn" type="button">🌙 Tema</button>

    </div>
  </header>

  <main>

    <section class="form-section" aria-label="Cadastro de usuário">
      <div class="container">
        <h2 class="section-title">Criar Conta</h2>

        <form id="registerForm" class="form-box">

          <label for="registerName">Nome:</label>
          <input type="text" id="registerName" placeholder="Digite seu nome" required>

          <label for="registerEmail">E-mail:</label>
          <input type="email" id="registerEmail" placeholder="Digite seu e-mail" required>

          <label for="registerPassword">Senha:</label>
          <input type="password" id="registerPassword" placeholder="Crie sua senha" required>

          <button class="btn-primary" type="submit">Cadastrar</button>

          <p class="form-message">
            Já tem conta? <a href="login.html">Faça login</a>
          </p>

        </form>

        <p id="registerMsg" class="form-message"></p>

      </div>
    </section>

  </main>

  <footer class="footer">
    <div class="container footer-content">
      <p>© 2026 LojaTech - Todos os direitos reservados.</p>
      <p>Email: contato@lojatech.com | Telefone: (65) 98103-8426</p>
      <p id="dateTime">Carregando data e hora...</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
