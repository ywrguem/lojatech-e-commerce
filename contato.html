<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LojaTech - Contato</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="header">
    <div class="container header-content">

      <h1 class="logo">Loja<span>Tech</span></h1>

      <nav aria-label="Menu principal">
        <ul class="menu">
          <li><a href="index.html">Início</a></li>
          <li><a href="produtos.html">Produtos</a></li>
          <li><a class="active" href="contato.html">Contato</a></li>
          <li><a href="login.html" id="userLink">Login</a></li>
          <li>
            <a href="carrinho.html">
              Carrinho <span id="cartCount" class="cart-count">0</span>
            </a>
          </li>
        </ul>
      </nav>

      <button id="themeBtn" class="theme-btn" type="button">🌙 Tema</button>

    </div>
  </header>

  <main>

    <section class="form-section" aria-label="Formulário de contato">
      <div class="container">
        <h2 class="section-title">Fale Conosco</h2>

        <form id="contactForm" class="form-box">

          <label for="name">Nome:</label>
          <input type="text" id="name" placeholder="Digite seu nome" required>

          <label for="email">E-mail:</label>
          <input type="email" id="email" placeholder="Digite seu e-mail" required>

          <label for="message">Mensagem:</label>
          <textarea id="message" placeholder="Digite sua mensagem" required></textarea>

          <button class="btn-primary" type="submit">Enviar Mensagem</button>
        </form>

        <p id="formMsg" class="form-message"></p>

      </div>
    </section>

  </main>

  <footer class="footer">
    <div class="container footer-content">
      <p>© 2026 LojaTech - Todos os direitos reservados.</p>
      <p>Email: contato@lojatech.com | Telefone: (65) 98103-8426</p>
      <p id="dateTime">Carregando data e hora...</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
