<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LojaTech - Contato</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="header">
    <div class="container header-content">
      <h1 class="logo">Loja<span>Tech</span></h1>

      <nav aria-label="Menu principal">
        <ul class="menu">
          <li><a href="index.html">Início</a></li>
          <li><a href="produtos.html">Produtos</a></li>
          <li><a class="active" href="contato.html">Contato</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>

    <section class="contact-section">
      <div class="container">
        <h2 class="section-title">Fale Conosco</h2>
        <p class="contact-text">Envie sua mensagem e responderemos o mais rápido possível.</p>

        <form class="contact-form">
          <label for="nome">Nome:</label>
          <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>

          <label for="email">E-mail:</label>
          <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>

          <label for="mensagem">Mensagem:</label>
          <textarea id="mensagem" name="mensagem" placeholder="Digite sua mensagem" required></textarea>

          <button type="submit" class="btn-primary">Enviar Mensagem</button>
        </form>

      </div>
    </section>

  </main>

  <footer class="footer">
    <div class="container footer-content">
      <p> 2026 LojaTech - Todos os direitos reservados.</p>
      <p>Email: contato@lojatech.com | Telefone: (65) 98103-8426 </p>
    </div>
  </footer>

  <script src="js/script.js"></script>

</body>
</html>
