<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LojaTech - Cadastro de Produto</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="header">
    <div class="container header-content">
      <h1 class="logo">Loja<span>Tech</span></h1>

      <nav aria-label="Menu principal">
        <ul class="menu">
          <li><a href="index.html">Início</a></li>
          <li><a href="produtos.html">Produtos</a></li>
          <li><a class="active" href="cadastro-produto.html">Cadastrar Produto</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>

    <section class="form-section" aria-label="Cadastro de produto">
      <div class="container">
        <h2 class="section-title">Cadastrar Produto</h2>

        <form class="form-box">
          <label for="nome-produto">Nome do Produto:</label>
          <input type="text" id="nome-produto" name="nome-produto" placeholder="Digite o nome do produto" required>

          <label for="descricao">Descrição:</label>
          <textarea id="descricao" name="descricao" placeholder="Digite a descrição do produto" required></textarea>

          <label for="preco">Preço:</label>
          <input type="text" id="preco" name="preco" placeholder="Ex: 199,90" required>

          <button class="btn-primary" type="submit">Cadastrar Produto</button>
        </form>
      </div>
    </section>

  </main>

  <footer class="footer">
    <div class="container footer-content">
      <p>© 2026 LojaTech - Todos os direitos reservados.</p>
      <p>Email: contato@lojatech.com | Telefone: (65) 99999-9999</p>
    </div>
  </footer>

</body>
</html>
