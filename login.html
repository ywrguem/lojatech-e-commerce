<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LojaTech - Login</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="header">
    <div class="container header-content">
      <h1 class="logo">Loja<span>Tech</span></h1>

      <nav aria-label="Menu principal">
        <ul class="menu">
          <li><a href="index.html">Início</a></li>
          <li><a href="produtos.html">Produtos</a></li>
          <li><a href="carrinho.html">Carrinho <span id="cart-count" class="cart-count">0</span></a></li>
          <li><a class="active" href="login.html">Login</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>

    <section class="form-section" aria-label="Área de login">
      <div class="container">
        <h2 class="section-title">Login</h2>

        <form class="form-box">
          <label for="email">E-mail:</label>
          <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>

          <label for="senha">Senha:</label>
          <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>

          <button class="btn-primary" type="submit">Entrar</button>
        </form>
      </div>
    </section>

  </main>

  <footer class="footer">
    <div class="container footer-content">
      <p>© 2026 LojaTech - Todos os direitos reservados.</p>
      <p>Email: contato@lojatech.com | Telefone: (65) 98103-8426</p>
    </div>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
